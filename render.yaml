services:
  - type: web
    name: formfast
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: formfast-db
          property: connectionString
    plan: free

databases:
  - name: formfast-db
    plan: free
    ipAllowList: []
