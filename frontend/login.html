<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 - FormFast</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <!-- Preload config to avoid race condition -->
  <script>
    // Fetch config immediately
    window._formfastConfig = fetch('/api/config').then(r => r.json());
  </script>
  <style>
    body { font-family: 'Inter', sans-serif; }
    .gradient-text {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .fade-in {
      animation: fadeIn 0.3s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .loading-spinner {
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col">
  <!-- Navigation -->
  <nav class="bg-white border-b border-gray-200">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between h-16">
        <div class="flex items-center">
          <a href="/" class="text-2xl font-bold gradient-text">FormFast</a>
        </div>
        <div class="flex items-center space-x-6">
          <a href="/" class="text-gray-600 hover:text-gray-900">首页</a>
          <a href="/#pricing" class="text-gray-600 hover:text-gray-900">定价</a>
        </div>
      </div>
    </div>
  </nav>

  <!-- Login Container -->
  <div class="flex-1 flex items-center justify-center px-4 py-12">
    <div class="max-w-md w-full">
      <!-- Login Card -->
      <div class="bg-white rounded-2xl shadow-lg p-8">
        <div class="text-center mb-8">
          <h1 class="text-2xl font-bold text-gray-900 mb-2">欢迎回来</h1>
          <p class="text-gray-600">登录以管理您的表单</p>
        </div>

        <!-- Google OAuth Button -->
        <div class="mb-6">
          <div id="g_id_onload"
               data-client_id=""
               data-callback="handleGoogleCredentialResponse"
               data-auto_prompt="false">
          </div>
          <div class="g_id_signin w-full"
               data-type="standard"
               data-size="large"
               data-theme="outline"
               data-text="sign_in_with"
               data-shape="rectangular"
               data-logo_alignment="left">
          </div>
        </div>

        <!-- Divider -->
        <div class="relative my-6">
          <div class="absolute inset-0 flex items-center">
            <div class="w-full border-t border-gray-300"></div>
          </div>
          <div class="relative flex justify-center text-sm">
            <span class="px-2 bg-white text-gray-500">或使用邮箱登录</span>
          </div>
        </div>

        <!-- Email Form -->
        <div id="emailFormContainer">
          <!-- Step 1: Enter Email -->
          <div id="emailStep">
            <label class="block text-sm font-medium text-gray-700 mb-2">邮箱地址</label>
            <input type="email" id="emailInput"
                   placeholder="your@email.com"
                   class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition">
            <div id="emailError" class="text-red-500 text-sm mt-2 hidden"></div>
            <button onclick="sendCode()" id="sendCodeBtn"
                    class="w-full mt-4 bg-indigo-600 text-white py-3 rounded-xl font-semibold hover:bg-indigo-700 transition flex items-center justify-center gap-2">
              <span id="sendCodeText">发送验证码</span>
              <span id="sendCodeLoading" class="hidden">
                <svg class="loading-spinner h-5 w-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                  <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                  <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
              </span>
            </button>
          </div>

          <!-- Step 2: Enter Code -->
          <div id="codeStep" class="hidden">
            <div class="mb-4">
              <p class="text-sm text-gray-600">验证码已发送至 <span id="codeEmail" class="font-medium text-gray-900"></span></p>
              <button onclick="backToEmail()" class="text-sm text-indigo-600 hover:text-indigo-700 mt-1">更换邮箱</button>
            </div>
            <label class="block text-sm font-medium text-gray-700 mb-2">验证码</label>
            <input type="text" id="codeInput"
                   placeholder="输入 6 位验证码"
                   maxlength="6"
                   class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition text-center text-2xl tracking-widest">
            <div id="codeError" class="text-red-500 text-sm mt-2 hidden"></div>
            <button onclick="verifyCode()" id="verifyCodeBtn"
                    class="w-full mt-4 bg-indigo-600 text-white py-3 rounded-xl font-semibold hover:bg-indigo-700 transition flex items-center justify-center gap-2">
              <span id="verifyCodeText">验证并登录</span>
              <span id="verifyCodeLoading" class="hidden">
                <svg class="loading-spinner h-5 w-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                  <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                  <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
              </span>
            </button>
            <button onclick="resendCode()" id="resendBtn"
                    class="w-full mt-3 text-gray-600 py-2 text-sm hover:text-gray-900 transition"
                    disabled>
              <span id="resendText">重新发送 (60s)</span>
            </button>
          </div>
        </div>
      </div>

      <!-- Features -->
      <div class="mt-8 grid grid-cols-3 gap-4 text-center">
        <div>
          <div class="w-10 h-10 bg-indigo-100 rounded-full flex items-center justify-center mx-auto mb-2">
            <svg class="w-5 h-5 text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
            </svg>
          </div>
          <p class="text-xs text-gray-600">安全登录</p>
        </div>
        <div>
          <div class="w-10 h-10 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-2">
            <svg class="w-5 h-5 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/>
            </svg>
          </div>
          <p class="text-xs text-gray-600">无需密码</p>
        </div>
        <div>
          <div class="w-10 h-10 bg-purple-100 rounded-full flex items-center justify-center mx-auto mb-2">
            <svg class="w-5 h-5 text-purple-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/>
            </svg>
          </div>
          <p class="text-xs text-gray-600">隐私保护</p>
        </div>
      </div>
    </div>
  </div>

  <!-- Toast Notification -->
  <div id="toast" class="fixed bottom-4 right-4 bg-gray-900 text-white px-6 py-3 rounded-lg shadow-lg transform translate-y-20 opacity-0 transition-all duration-300 z-50">
    <span id="toastMessage"></span>
  </div>

  <script>
    const API_BASE = window.location.origin;
    let currentEmail = '';
    let resendTimer = null;
    let resendCountdown = 60;

    // Check if already logged in
    const userEmail = localStorage.getItem('formfast_user_email');
    if (userEmail) {
      window.location.href = '/dashboard.html';
    }

    // Configure Google OAuth
    window.onload = async function() {
      try {
        // Use preloaded config
        const config = await window._formfastConfig;
        console.log('Config loaded:', config);
        if (config.googleClientId) {
          document.getElementById('g_id_onload').setAttribute('data-client_id', config.googleClientId);
          // Reinitialize Google Sign-In with new client_id
          if (window.google && window.google.accounts) {
            window.google.accounts.id.initialize({
              client_id: config.googleClientId,
              callback: handleGoogleCredentialResponse,
              auto_select: false
            });
            window.google.accounts.id.renderButton(
              document.querySelector('.g_id_signin'),
              { type: 'standard', size: 'large', theme: 'outline', text: 'sign_in_with', shape: 'rectangular', logo_alignment: 'left' }
            );
          }
        } else {
          console.error('Google Client ID not configured');
        }
      } catch (err) {
        console.error('Failed to load config:', err);
      }
    };

    // Show toast notification
    function showToast(message, type = 'success') {
      const toast = document.getElementById('toast');
      const toastMessage = document.getElementById('toastMessage');
      toastMessage.textContent = message;
      toast.classList.remove('translate-y-20', 'opacity-0');
      toast.classList.add('translate-y-0', 'opacity-100');

      setTimeout(() => {
        toast.classList.add('translate-y-20', 'opacity-0');
        toast.classList.remove('translate-y-0', 'opacity-100');
      }, 3000);
    }

    // Send verification code
    async function sendCode() {
      const email = document.getElementById('emailInput').value.trim();
      const errorDiv = document.getElementById('emailError');
      const btn = document.getElementById('sendCodeBtn');
      const btnText = document.getElementById('sendCodeText');
      const btnLoading = document.getElementById('sendCodeLoading');

      if (!email || !email.includes('@')) {
        errorDiv.textContent = '请输入有效的邮箱地址';
        errorDiv.classList.remove('hidden');
        return;
      }

      btn.disabled = true;
      btnText.textContent = '发送中...';
      btnLoading.classList.remove('hidden');
      errorDiv.classList.add('hidden');

      try {
        const res = await fetch(`${API_BASE}/api/auth/email/send-code`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email })
        });

        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err.error || '发送失败');
        }

        const data = await res.json();
        currentEmail = email;
        document.getElementById('codeEmail').textContent = email;
        
        // Show debug code if available (for testing when email fails)
        if (data.debugCode) {
          showToast(`验证码: ${data.debugCode} (调试模式)`);
          // Also show in UI
          const debugDiv = document.createElement('div');
          debugDiv.id = 'debugCodeDisplay';
          debugDiv.className = 'bg-yellow-50 border border-yellow-200 p-3 rounded-lg mb-4';
          debugDiv.innerHTML = `<p class="text-sm text-yellow-800"><strong>调试验证码：</strong>${data.debugCode}</p><p class="text-xs text-yellow-600 mt-1">邮件服务暂时不可用，请使用此验证码测试</p>`;
          const codeStep = document.getElementById('codeStep');
          codeStep.insertBefore(debugDiv, codeStep.firstChild);
        } else {
          showToast('验证码已发送');
        }

        // Switch to code step
        document.getElementById('emailStep').classList.add('hidden');
        document.getElementById('codeStep').classList.remove('hidden');
        document.getElementById('codeStep').classList.add('fade-in');
        document.getElementById('codeInput').focus();

        // Start countdown
        startResendCountdown();
      } catch (err) {
        errorDiv.textContent = err.message;
        errorDiv.classList.remove('hidden');
      } finally {
        btn.disabled = false;
        btnText.textContent = '发送验证码';
        btnLoading.classList.add('hidden');
      }
    }

    // Verify code
    async function verifyCode() {
      const code = document.getElementById('codeInput').value.trim();
      const errorDiv = document.getElementById('codeError');
      const btn = document.getElementById('verifyCodeBtn');
      const btnText = document.getElementById('verifyCodeText');
      const btnLoading = document.getElementById('verifyCodeLoading');

      if (!code || code.length !== 6) {
        errorDiv.textContent = '请输入6位验证码';
        errorDiv.classList.remove('hidden');
        return;
      }

      btn.disabled = true;
      btnText.textContent = '验证中...';
      btnLoading.classList.remove('hidden');
      errorDiv.classList.add('hidden');

      try {
        const res = await fetch(`${API_BASE}/api/auth/email/verify`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: currentEmail, code })
        });

        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err.error || '验证失败');
        }

        const data = await res.json();

        // Save user info
        localStorage.setItem('formfast_user_email', currentEmail);
        localStorage.setItem('formfast_user_status', data.user.subscriptionStatus);

        showToast('登录成功！');
        setTimeout(() => {
          window.location.href = '/dashboard.html';
        }, 500);
      } catch (err) {
        errorDiv.textContent = err.message;
        errorDiv.classList.remove('hidden');
        btn.disabled = false;
        btnText.textContent = '验证并登录';
        btnLoading.classList.add('hidden');
      }
    }

    // Handle Google OAuth response
    async function handleGoogleCredentialResponse(response) {
      try {
        const res = await fetch(`${API_BASE}/api/auth/google`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token: response.credential })
        });

        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err.error || 'Google 登录失败');
        }

        const data = await res.json();

        // Save user info
        localStorage.setItem('formfast_user_email', data.user.email);
        localStorage.setItem('formfast_user_status', data.user.subscriptionStatus);

        showToast('登录成功！');
        setTimeout(() => {
          window.location.href = '/dashboard.html';
        }, 500);
      } catch (err) {
        showToast(err.message, 'error');
      }
    }

    // Back to email step
    function backToEmail() {
      document.getElementById('codeStep').classList.add('hidden');
      document.getElementById('emailStep').classList.remove('hidden');
      document.getElementById('emailStep').classList.add('fade-in');
      document.getElementById('emailInput').value = '';
      document.getElementById('emailError').classList.add('hidden');
      clearInterval(resendTimer);
    }

    // Resend code
    async function resendCode() {
      if (resendCountdown > 0) return;

      const btn = document.getElementById('resendBtn');
      btn.disabled = true;

      try {
        const res = await fetch(`${API_BASE}/api/auth/email/send-code`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: currentEmail })
        });

        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err.error || '发送失败');
        }

        showToast('验证码已重新发送');
        resendCountdown = 60;
        startResendCountdown();
      } catch (err) {
        showToast(err.message, 'error');
        btn.disabled = false;
      }
    }

    // Start resend countdown
    function startResendCountdown() {
      const btn = document.getElementById('resendBtn');
      const text = document.getElementById('resendText');
      resendCountdown = 60;
      btn.disabled = true;

      resendTimer = setInterval(() => {
        resendCountdown--;
        text.textContent = `重新发送 (${resendCountdown}s)`;

        if (resendCountdown <= 0) {
          clearInterval(resendTimer);
          text.textContent = '重新发送';
          btn.disabled = false;
        }
      }, 1000);
    }

    // Allow Enter key to submit
    document.getElementById('emailInput')?.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') sendCode();
    });

    document.getElementById('codeInput')?.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') verifyCode();
    });
  </script>
</body>
</html>
